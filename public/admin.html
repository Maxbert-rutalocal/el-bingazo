<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EL BINGAZO - DJ EDITION</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --primary: #ff9900; --secondary: #1e90ff; --bg: #050505; --surface: #121212; --text: #ffffff; --accent: #27ae60; --danger: #e74c3c; --win-gold: #ffd700; --dj-color: #9c27b0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: linear-gradient(90deg, #ff9900, #ffcc00); color: #000; padding: 10px; font-size: 22px; font-weight: 900; text-align: center; text-transform: uppercase; }
        .mainLayout { display: grid; grid-template-columns: 320px 1fr 300px; gap: 15px; padding: 15px; flex: 1; overflow: hidden;}
        .panel { background: var(--surface); padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #222; overflow-y: auto;}
        
        .ball-area { display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); border-radius: 20px; border: 1px solid #333; min-height: 350px; perspective: 1000px; overflow: hidden;}
        #ball { width: 220px; height: 220px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff, var(--secondary) 20%, #000 90%); display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 50px rgba(30, 144, 255, 0.4); border: 10px solid #fff; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
        #letter { font-size: 50px; font-weight: 900; line-height: 0.8; transition: 0.2s; color: #000; text-align: center; width: 90%; word-wrap: break-word; }
        #number { font-size: 110px; font-weight: 900; line-height: 0.8; transition: 0.2s; color: #000; }

        #ball.phase-1 { transform: scale(2.6); background: radial-gradient(circle at 35% 35%, #fff, var(--win-gold) 30%, #442c00 90%); box-shadow: 0 0 100px var(--win-gold); border-color: var(--win-gold); animation: shake 0.1s infinite; }
        #ball.phase-2 #letter { font-size: 140px !important; display: block; }
        #ball.phase-2 #number { display: none; }
        #ball.phase-3 { transform: scale(2.3); animation: none; }
        #ball.phase-3 #letter { font-size: 45px !important; margin-bottom: -10px; }
        #ball.phase-3 #number { font-size: 110px !important; display: block; }
        @keyframes shake { 0% { transform: scale(2.6) translate(3px, 3px); } 50% { transform: scale(2.62) translate(-3px, -3px); } 100% { transform: scale(2.6) translate(3px, 3px); } }

        #board { display: grid; grid-template-columns: repeat(15, 1fr); gap: 4px; background: #000; padding: 10px; border-radius: 10px; }
        .cell { background: #1a1a1a; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-size: 12px; color: #444; }
        .cell.marked { background: var(--primary); color: #000; font-weight: bold; box-shadow: 0 0 10px var(--primary); transform: scale(1.1); z-index: 2; }
        
        .btn { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; font-size: 11px;}
        #drawBtn { background: var(--accent); color: white; }
        #drawBtn.win-step { background: var(--win-gold); color: #000; box-shadow: 0 0 15px var(--win-gold); border: 2px solid #000; }
        #autoBtn { background: var(--secondary); color: white; }
        
        #winnerOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .winner-card { background: white; color: black; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 0 100px var(--win-gold); border: 5px solid var(--win-gold); animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }

        #historialPanel { position: fixed; top: 70px; left: 345px; width: 280px; max-height: 60vh; background: var(--surface); border: 2px solid var(--primary); border-radius: 12px; z-index: 1000; display: none; flex-direction: column; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .hist-item { background: #000; padding: 10px; border-radius: 6px; margin-bottom: 8px; border-left: 4px solid var(--win-gold); font-size: 13px; }

        .dj-panel { background: #0a0a0a; border: 1px solid var(--dj-color); padding: 10px; border-radius: 10px; margin-top: 10px; }
        .dj-title { color: var(--dj-color); font-size: 12px; font-weight: bold; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        #djGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; max-height: 200px; overflow-y: auto; padding-right: 5px; }
        .dj-btn { background: #222; border: 1px solid #444; color: #ddd; padding: 8px 5px; font-size: 9px; border-radius: 4px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: 0.2s; }
        .dj-btn.playing { background: var(--dj-color); color: white; box-shadow: 0 0 8px var(--dj-color); }
    </style>
</head>
<body>

<header>EL BINGAZO - DJ EDITION</header>

<div class="mainLayout">
    <!-- PANEL IZQUIERDO -->
    <div class="panel">
        <div class="config-box">
            <label style="font-size: 11px; color: #aaa;">BASE DE DATOS DE CARTONES</label>
            <input type="file" id="fileInput" accept=".json" style="font-size: 11px;">
            <div id="dbStatus" style="color: var(--danger); font-size: 11px; margin-top: 5px; text-align: center;">0 CARTONES CARGADOS</div>
        </div>

        <div class="config-box" style="background: #000; padding: 10px; border-radius: 8px; border: 1px solid var(--primary);">
            <label style="color: var(--primary); font-weight: bold; font-size: 11px; display: block; margin-bottom: 5px;">TÍTULO DE LA PARTIDA</label>
            <input type="text" id="gameTitleInput" placeholder="Ej: CARTÓN LLENO" oninput="updateGameDisplay()" style="width:100%; padding:8px; background:#111; color:white; border:1px solid #333; box-sizing: border-box; text-transform: uppercase;">
        </div>
        
        <button id="drawBtn" class="btn">🎱 SACAR BOLA</button>
        <button id="autoBtn" class="btn">▶ INICIAR AUTO-SORTEO</button>
        <button onclick="toggleHistorial()" class="btn" style="background: #673ab7; color: white;">📜 HISTORIAL</button>
        <button onclick="barridoSoloBolas()" class="btn" style="background: #607d8b; color: white;">🧹 BARRIDO</button>
        
        <div class="config-box" style="text-align: center; background: #000; padding: 10px; border-radius: 8px;">
            <div id="statRest" style="font-size: 32px; color: var(--primary); font-weight: bold;">75</div>
            <div style="font-size: 10px; text-transform: uppercase;">Restantes</div>
        </div>

        <div class="dj-panel">
            <div class="dj-title">
                <span>🎧 DJ CONTROL</span>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="font-size: 10px;">🔈</span>
                    <input type="range" id="djVolume" min="0" max="1" step="0.1" value="0.5" style="width: 60px; accent-color: var(--dj-color); cursor: pointer;">
                    <input type="file" id="djFiles" multiple accept="audio/*" style="display:none">
                    <button onclick="document.getElementById('djFiles').click()" style="background:var(--dj-color); border:none; color:white; border-radius:3px; font-size:10px; cursor:pointer; padding:2px 5px;">+ CARGAR</button>
                </div>
            </div>
            <div id="djGrid"></div>
        </div>

        <div class="config-box" style="background: #000; padding: 10px; border-radius: 8px;">
            <label style="display:block; font-size: 11px;">
                <input type="checkbox" id="fxToggle" checked> Efectos de Sonido
            </label>
        </div>
    </div>

    <!-- PANEL CENTRAL -->
    <div style="display:flex; flex-direction:column; gap:10px; overflow-y: auto;">
        <div class="ball-area">
            <div id="ball">
                <div id="letter">LISTO</div>
                <div id="number">--</div>
            </div>
        </div>
        <div style="background: var(--surface); padding: 15px; border-radius: 12px; border: 1px solid #222;">
            <div id="board"></div>
        </div>
    </div>

    <!-- PANEL DERECHO (VINCULADOR DE DOBLE MEMORIA) -->
    <div class="panel">
        <div class="config-box" style="background: #000; padding: 10px; border-radius: 8px;">
            <label style="color:var(--secondary); font-weight: bold; display: block; margin-bottom: 5px;">CARTONES EN JUEGO</label>
            <input id="cardInput" type="text" placeholder="Ej: 1-100 ó 5,20,33" style="width:100%; padding:8px; background:#111; color:white; border:1px solid #333;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 5px;">
                <button onclick="vincularCarton()" class="btn" style="background: var(--accent); padding: 8px;">VINCULAR MANUAL</button>
                <button onclick="vincularTodos()" class="btn" style="background: #9c27b0; padding: 8px;">VINCULAR TODOS</button>
                <button onclick="desvincularCarton()" class="btn" style="background: var(--danger); padding: 8px;">DESVINCULAR</button>
                <button onclick="limpiarLista()" class="btn" style="background: #444; padding: 8px;">LIMPIAR MANUALES</button>
            </div>
            <div id="cardCounter" style="font-size: 16px; color: var(--success); margin-top: 10px; text-align: center; font-weight: bold; background: #0a0a0a; padding: 10px; border-radius: 5px; border: 1px solid var(--success);">
                Activos en juego: 0
            </div>
            <p style="font-size: 10px; color: #888; text-align: center; margin-top: 5px;">El sistema suma automáticamente los aprobados en Gestión y los vinculados manualmente aquí.</p>
        </div>

        <div class="config-box" style="background: #000; padding: 10px; border-radius: 8px;">
            <label style="font-weight: bold; font-size: 12px;">PATRONES ACTIVOS</label>
            <div style="font-size: 11px; margin-top: 8px; display: flex; flex-direction: column; gap: 4px;">
                <label><input type="checkbox" id="check-full" class="pattern-check" value="full" checked> Cartón Lleno</label>
                <label><input type="checkbox" id="check-cruzG" class="pattern-check" value="cruzG" checked> Cruz Grande</label>
                <label><input type="checkbox" id="check-cruzP" class="pattern-check" value="cruzP"> Cruz Pequeña</label>
                <label><input type="checkbox" id="check-cuadro" class="pattern-check" value="cuadro"> Cuadrito 2x2 (Fuera del Centro)</label>
                <label><input type="checkbox" id="check-esquinas" class="pattern-check" value="esquinas"> Cuatro Esquinas</label>
                <label><input type="checkbox" id="check-diagonal" class="pattern-check" value="diagonal"> Diagonales</label>
                <label><input type="checkbox" id="check-lineaV" class="pattern-check" value="lineaV"> Línea Vertical</label>
                <label><input type="checkbox" id="check-lineaH" class="pattern-check" value="lineaH"> Línea Horizontal</label>
            </div>
        </div>
    </div>
</div>

<div id="historialPanel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <span style="color: var(--primary); font-weight: bold;">🏆 GANADORES</span>
        <button onclick="borrarHistorial()" style="background: none; border: none; color: var(--danger); cursor: pointer; font-size: 10px;">BORRAR</button>
    </div>
    <div id="histContent" style="overflow-y: auto; flex: 1;"></div>
    <button onclick="toggleHistorial()" class="btn" style="background: #333; margin-top: 10px;">CERRAR</button>
</div>

<div id="winnerOverlay">
    <div class="winner-card">
        <p style="font-size: 100px; font-weight: 900; color: var(--primary); margin: 0;">¡BINGO!</p>
        <div id="winPattern" style="font-size: 20px; font-weight: bold; background: #eee; padding: 5px 20px; border-radius: 20px;">PATRÓN</div>
        <div id="winnerList" style="font-size: 50px; font-weight: 900; margin: 20px 0;">---</div>
        <button onclick="cerrarGanador()" class="btn" style="background: var(--primary); width: 100%; font-size: 20px; height: 60px;">CONTINUAR JUEGO</button>
    </div>
</div>

<script>
    const socket = io();

    socket.on('RESETEO_GLOBAL_VENTAS', () => { location.reload(); });
    socket.on('ADMIN_ALERTA_PAUSA', (data) => alert(`⏸ PAUSA SOLICITADA por ${data.nombre} (Cartón: ${data.cartonId})`));
    socket.on('ADMIN_ALERTA_BINGO', (data) => alert(`🚨 ¡ALERTA DE BINGO! ${data.nombre} (Cartón: ${data.cartonId}) está reclamando Bingo.`));

    let allCards = [], linkedCards = [], drawnBalls = new Set(), autoInterval = null;
    let ventasGlobales = []; 
    
    // SISTEMA DE DOBLE MEMORIA (Evita que lo automático borre lo manual)
    let manualLinkedIds = new Set();
    let autoLinkedIds = new Set();

    let winnerFound = null, clickPhase = 0, pendingBall = { num: 0, letter: '' }, winnersHistory = []; 
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    socket.on('GESTION_NUEVO_REGISTRO', (ventas) => {
        ventasGlobales = ventas;
        procesarCartonesAutomaticos();
    });

    function procesarCartonesAutomaticos() {
        autoLinkedIds.clear();
        ventasGlobales.forEach(venta => {
            if (venta.pagado) { 
                venta.cartones.forEach(id => autoLinkedIds.add(String(id).toUpperCase()));
            }
        });
        actualizarListaVinculados();
    }

    function actualizarListaVinculados() {
        if (allCards.length === 0) return;
        linkedCards = [];
        
        // Sumamos los manuales + automáticos
        const combinedIds = new Set([...manualLinkedIds, ...autoLinkedIds]);
        
        combinedIds.forEach(id => {
            const card = allCards.find(c => String(c.id).toUpperCase() === id);
            if (card) linkedCards.push(card);
        });
        document.getElementById('cardCounter').textContent = `Activos en juego: ${linkedCards.length}`;
    }

    // --- FUNCIONES MANUALES ---
    function vincularCarton() {
        const inputVal = document.getElementById('cardInput').value.trim();
        if (!inputVal) return;
        const chunks = inputVal.split(/[, ]+/);
        chunks.forEach(chunk => {
            if (chunk.includes('-')) {
                const parts = chunk.split('-');
                if (parts.length === 2) {
                    const start = parseInt(parts[0]), end = parseInt(parts[1]);
                    if (!isNaN(start) && !isNaN(end)) {
                        for (let i = start; i <= end; i++) {
                            manualLinkedIds.add(String(i).toUpperCase());
                        }
                    }
                }
            } else {
                manualLinkedIds.add(chunk.toUpperCase());
            }
        });
        actualizarListaVinculados();
        document.getElementById('cardInput').value = "";
    }

    function vincularTodos() {
        if (allCards.length === 0) return alert("Carga la base de datos.");
        allCards.forEach(c => manualLinkedIds.add(String(c.id).toUpperCase()));
        actualizarListaVinculados();
    }

    function desvincularCarton() {
        const id = document.getElementById('cardInput').value.trim().toUpperCase();
        if (!id) return;
        manualLinkedIds.delete(id);
        actualizarListaVinculados();
        document.getElementById('cardInput').value = "";
    }

    function limpiarLista() {
        if(confirm("¿Limpiar vinculaciones manuales? (Los aprobados desde Gestión seguirán activos)")) {
            manualLinkedIds.clear();
            actualizarListaVinculados();
        }
    }

    let djAudios = [], currentVolume = 0.5;
    document.getElementById('djVolume').addEventListener('input', function(e) {
        currentVolume = e.target.value; djAudios.forEach(obj => { obj.audio.volume = currentVolume; });
    });
    document.getElementById('djFiles').addEventListener('change', function(e) {
        const grid = document.getElementById('djGrid');
        Array.from(e.target.files).forEach(file => {
            const audio = new Audio(URL.createObjectURL(file)); audio.volume = currentVolume;
            const btn = document.createElement('button'); btn.className = 'dj-btn'; btn.textContent = file.name.split('.')[0].toUpperCase();
            djAudios.push({ audio: audio, button: btn });
            btn.onclick = () => { if (audio.paused) { audio.currentTime = 0; audio.play(); btn.classList.add('playing'); } else { audio.pause(); btn.classList.remove('playing'); } };
            audio.onended = () => btn.classList.remove('playing');
            grid.appendChild(btn);
        });
    });

    function playBallSound() {
        if (!document.getElementById('fxToggle').checked) return;
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function playExplosionSound() {
        if (!document.getElementById('fxToggle').checked) return;
        const bufferSize = audioCtx.sampleRate * 0.5, buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate), data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = audioCtx.createBufferSource(), gain = audioCtx.createGain(); noise.buffer = buffer;
        gain.gain.setValueAtTime(0.4, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        noise.connect(gain); gain.connect(audioCtx.destination); noise.start();
    }

    function soundWinner() {
        if (!document.getElementById('fxToggle').checked) return;
        [523, 659, 783, 1046].forEach((f, i) => {
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(f, audioCtx.currentTime + i * 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime + i * 0.1); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.4);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(audioCtx.currentTime + i * 0.1); osc.stop(audioCtx.currentTime + i * 0.1 + 0.5);
        });
    }

    function updateGameDisplay() {
        const title = document.getElementById('gameTitleInput').value.trim(), letterEl = document.getElementById('letter'), numberEl = document.getElementById('number');
        if (drawnBalls.size === 0 && !winnerFound) { letterEl.textContent = title !== "" ? title.toUpperCase() : "LISTO"; letterEl.style.fontSize = title.length > 10 ? "25px" : "40px"; numberEl.textContent = "--"; }
    }

    const board = document.getElementById('board');
    for (let i = 1; i <= 75; i++) { const cell = document.createElement('div'); cell.className = 'cell'; cell.id = `cell-${i}`; cell.textContent = i; board.appendChild(cell); }

    document.getElementById('fileInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            allCards = JSON.parse(ev.target.result);
            document.getElementById('dbStatus').textContent = allCards.length + " CARTONES LISTOS";
            document.getElementById('dbStatus').style.color = "var(--accent)";
            procesarCartonesAutomaticos(); 
        };
        reader.readAsText(e.target.files[0]);
    };

    function mainDrawAction() { if (audioCtx.state === 'suspended') audioCtx.resume(); if (winnerFound) { clickPhase++; ejecutarFaseGanador(); return; } drawBall(); }

    function drawBall() {
        if (drawnBalls.size >= 75) return detenerSorteo();
        let ball; do { ball = Math.floor(Math.random() * 75) + 1; } while (drawnBalls.has(ball));
        drawnBalls.add(ball);
        const letra = ['B', 'I', 'N', 'G', 'O'][Math.floor((ball - 1) / 15)];
        pendingBall = { num: ball, letter: letra }; playBallSound();
        socket.emit('ADMIN_SACAR_BOLA', { bola: ball, letra: letra });
        const winners = checkWinners();
        if (winners.win) {
            detenerSorteo(); winnerFound = winners; clickPhase = 1; document.getElementById('letter').textContent = ""; document.getElementById('number').textContent = ""; ejecutarFaseGanador();
        } else {
            document.getElementById('letter').style.fontSize = "50px"; document.getElementById('letter').textContent = letra; document.getElementById('number').textContent = ball;
            document.getElementById(`cell-${ball}`).classList.add('marked'); document.getElementById('statRest').textContent = 75 - drawnBalls.size;
        }
    }

    function ejecutarFaseGanador() {
        const ballEl = document.getElementById('ball'), letterEl = document.getElementById('letter'), numberEl = document.getElementById('number'), btn = document.getElementById('drawBtn');
        switch(clickPhase) {
            case 1: letterEl.textContent = ""; numberEl.textContent = ""; ballEl.className = 'phase-1'; btn.classList.add('win-step'); btn.textContent = "2. VER LETRA"; break;
            case 2: letterEl.textContent = pendingBall.letter; ballEl.classList.add('phase-2'); btn.textContent = "3. ¡REVENTAR!"; break;
            case 3: playExplosionSound(); numberEl.textContent = pendingBall.num; document.getElementById(`cell-${pendingBall.num}`).classList.add('marked'); document.getElementById('statRest').textContent = 75 - drawnBalls.size; ballEl.className = 'phase-3'; btn.textContent = "4. VER GANADORES"; break;
            case 4: 
                winnerFound.ids.forEach(id => winnersHistory.push({ id: id, pattern: winnerFound.pattern, bola: pendingBall.num })); updateHistorialUI();
                socket.emit('ADMIN_DECLARAR_GANADOR', { ids: winnerFound.ids, pattern: winnerFound.pattern });
                document.getElementById('winnerList').textContent = winnerFound.ids.join(" | "); document.getElementById('winPattern').textContent = winnerFound.pattern; document.getElementById('winnerOverlay').style.display = 'flex'; soundWinner(); document.getElementById('winnerOverlay').dataset.interval = setInterval(soundWinner, 3000); break;
        }
    }

    function cerrarGanador() { document.getElementById('winnerOverlay').style.display = 'none'; document.getElementById('ball').className = ''; document.getElementById('drawBtn').classList.remove('win-step'); document.getElementById('drawBtn').textContent = "🎱 SACAR BOLA"; winnerFound = null; clickPhase = 0; clearInterval(document.getElementById('winnerOverlay').dataset.interval); updateGameDisplay(); }

    function checkWinners() {
        const patterns = Array.from(document.querySelectorAll('.pattern-check:checked')).map(cb => cb.value);
        let res = { win: false, ids: [], pattern: "" }; const isM = (v) => v === "FREE" || v === 0 || drawnBalls.has(v);
        for (let card of linkedCards) {
            const g = card.grid; let win = false; let pName = "";
            if (patterns.includes('full') && g.flat().every(isM)) { win = true; pName = "CARTÓN LLENO"; }
            if (!win && patterns.includes('cruzG')) { if ([0,1,2,3,4].every(c => isM(g[2][c])) && [0,1,2,3,4].every(r => isM(g[r][2]))) { win = true; pName = "CRUZ GRANDE"; } }
            if (!win && patterns.includes('cruzP')) { if (isM(g[1][2]) && isM(g[2][1]) && isM(g[3][2]) && isM(g[2][3]) && isM(g[2][2])) { win = true; pName = "CRUZ PEQUEÑA"; } }
            if (!win && patterns.includes('cuadro')) { for(let f=0; f<4; f++) { for(let c=0; c<4; c++) { if (!((f===1 && c===1) || (f===1 && c===2) || (f===2 && c===1) || (f===2 && c===2))) { if(isM(g[f][c]) && isM(g[f+1][c]) && isM(g[f][c+1]) && isM(g[f+1][c+1])) { win = true; pName = "CUADRITO 2x2"; break; } } } if(win) break; } }
            if (!win && patterns.includes('esquinas')) { if(isM(g[0][0]) && isM(g[0][4]) && isM(g[4][0]) && isM(g[4][4])) { win = true; pName = "CUATRO ESQUINAS"; } }
            if (!win && patterns.includes('diagonal')) { if([0,1,2,3,4].every(i => isM(g[i][i])) || [0,1,2,3,4].every(i => isM(g[i][4-i]))) { win = true; pName = "DIAGONAL"; } }
            if (!win && patterns.includes('lineaV')) { for(let c=0; c<5; c++) if([0,1,2,3,4].every(r => isM(g[r][c]))) { win = true; pName = "LÍNEA VERTICAL"; break; } }
            if (!win && patterns.includes('lineaH')) { for(let f=0; f<5; f++) if(g[f].every(isM)) { win = true; pName = "LÍNEA HORIZONTAL"; break; } }
            if (win) { res.win = true; res.ids.push(card.id); res.pattern = pName; }
        } return res;
    }

    function barridoSoloBolas() { detenerSorteo(); drawnBalls.clear(); document.querySelectorAll('.cell').forEach(c => c.classList.remove('marked')); document.getElementById('number').textContent = '--'; document.getElementById('statRest').textContent = '75'; cerrarGanador(); updateGameDisplay(); socket.emit('ADMIN_REINICIAR_JUEGO'); }
    document.getElementById('drawBtn').onclick = mainDrawAction;
    document.getElementById('autoBtn').onclick = function() { if (audioCtx.state === 'suspended') audioCtx.resume(); if (autoInterval) detenerSorteo(); else { autoInterval = setInterval(drawBall, 4000); this.textContent = "⏸ DETENER AUTO"; this.style.background = "var(--danger)"; } };
    function detenerSorteo() { clearInterval(autoInterval); autoInterval = null; document.getElementById('autoBtn').textContent = "▶ INICIAR AUTO-SORTEO"; document.getElementById('autoBtn').style.background = "var(--secondary)"; }
    
    function toggleHistorial() { const p = document.getElementById('historialPanel'); p.style.display = (p.style.display === 'flex') ? 'none' : 'flex'; }
    function borrarHistorial() { if(confirm("¿Limpiar historial?")) { winnersHistory = []; updateHistorialUI(); } }
    function updateHistorialUI() { document.getElementById('histContent').innerHTML = winnersHistory.map(w => `<div class="hist-item"><div style="color:var(--win-gold); font-weight:bold;">Cartón: ${w.id}</div><div style="font-size:11px; color:#aaa;">${w.pattern} - Bola ${w.bola}</div></div>`).reverse().join(''); }
</script>
