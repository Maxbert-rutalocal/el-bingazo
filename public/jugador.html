<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL BINGAZO - JUGADOR</title>
    <style>
        :root {
            --primary: #ff9900;
            --secondary: #1e90ff;
            --bg: #0b0b0f;
            --surface: #161622;
            --text: #ffffff;
            --accent: #27ae60;
            --danger: #e74c3c;
            --win-gold: #ffd700;
            --board-bg: #000000;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        header {
            text-align: center;
            padding: 15px 10px;
            background: linear-gradient(135deg, #2a1b4e, #0b0b0f);
            border-radius: 16px;
            border: 1px solid #3d2b7a;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--primary), var(--win-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            margin-top: 10px;
            color: #aaa;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: bold;
        }
        .bg-online { background: rgba(39, 174, 96, 0.2); color: #2ecc71; border: 1px solid #2ecc71; }
        .bg-offline { background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; }

        /* PANEL DE BÚSQUEDA */
        .card-selector {
            background: var(--surface);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #2d2d3f;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .card-selector label {
            font-size: 13px;
            font-weight: bold;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group {
            display: flex;
            gap: 8px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            border: 2px solid #2d2d3f;
            background: #0b0b0f;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--secondary);
            outline: none;
            box-shadow: 0 0 10px rgba(30, 144, 255, 0.3);
        }

        .btn {
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .btn:active { transform: scale(0.95); }

        /* DISEÑO DE LA TABLA BINGO */
        .bingo-card {
            background: var(--surface);
            border-radius: 20px;
            padding: 15px;
            border: 2px solid #2d2d3f;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none; /* Se muestra al cargar un cartón */
            flex-direction: column;
            gap: 10px;
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .card-header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2d2d3f;
            padding-bottom: 10px;
            margin-bottom: 5px;
        }

        .card-id-badge {
            background: linear-gradient(135deg, var(--primary), #ff5500);
            color: #000;
            font-size: 18px;
            font-weight: 900;
            padding: 4px 14px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(255, 153, 0, 0.3);
        }

        .grid-header {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            text-align: center;
        }

        .letter-cell {
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            padding: 8px 0;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        .letter-cell:nth-child(1) { color: #ff5e57; }
        .letter-cell:nth-child(2) { color: #ffdd59; }
        .letter-cell:nth-child(3) { color: #0be881; }
        .letter-cell:nth-child(4) { color: #3c40c6; }
        .letter-cell:nth-child(5) { color: #05c46b; }

        .grid-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            background: var(--board-bg);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid #2d2d3f;
        }

        .board-cell {
            aspect-ratio: 1;
            background: #11111a;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: #ddd;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            border: 1px solid #1a1a26;
        }

        /* Marcado estándar */
        .board-cell.marked {
            background: radial-gradient(circle, #ff9900 0%, #cc6600 100%);
            color: #000;
            font-weight: 900;
            box-shadow: 0 0 12px var(--primary);
            border-color: #ffaa33;
            transform: scale(0.95);
        }

        /* Celda central libre */
        .board-cell.free-cell {
            background: radial-gradient(circle, #3d2b7a 0%, #161622 100%);
            color: var(--win-gold);
            font-size: 11px;
            font-weight: 900;
            border: 1px dashed var(--win-gold);
        }

        .board-cell.free-cell.marked {
            background: radial-gradient(circle, var(--win-gold) 0%, #cc9900 100%);
            color: #000;
            box-shadow: 0 0 15px var(--win-gold);
        }

        /* Última bola cantada */
        .board-cell.just-marked {
            animation: pulse-glow 1.5s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px var(--primary); transform: scale(0.93); }
            100% { box-shadow: 0 0 20px var(--primary); transform: scale(1.02); }
        }

        /* PANEL DE BOLAS CANTADAS RECIENTES */
        .recent-balls-panel {
            background: var(--surface);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid #2d2d3f;
        }

        .recent-title {
            font-size: 12px;
            font-weight: bold;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .balls-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .ball-pill {
            min-width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #2d2d3f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 14px;
            color: #fff;
            border: 2px solid #3d3d5c;
            flex-shrink: 0;
        }

        .ball-pill.active {
            background: radial-gradient(circle at 35% 35%, #fff, var(--secondary) 30%, #000 90%);
            border-color: #fff;
            color: #000;
            box-shadow: 0 0 10px rgba(30, 144, 255, 0.5);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>EL BINGAZO LIVE</h1>
        <div class="status-bar">
            <span>SALA DE TRANSMISIÓN</span>
            <span id="connectionStatus" class="badge bg-offline">CONECTANDO...</span>
        </div>
    </header>

    <div class="card-selector">
        <label>Ingresa tu ID de Cartón</label>
        <div class="input-group">
            <input type="text" id="cardIdInput" placeholder="Ej: 4A2" maxlength="6">
            <button class="btn" onclick="buscarYAsignarCarton()">Cargar</button>
        </div>
    </div>

    <div class="bingo-card" id="bingoCardContainer">
        <div class="card-header-info">
            <span style="font-weight: bold; color: #888;">ID CARTÓN</span>
            <span class="card-id-badge" id="displayCardId">---</span>
        </div>

        <div class="grid-header">
            <div class="letter-cell">B</div>
            <div class="letter-cell">I</div>
            <div class="letter-cell">N</div>
            <div class="letter-cell">G</div>
            <div class="letter-cell">O</div>
        </div>

        <div class="grid-board" id="boardGrid"></div>
    </div>

    <div class="recent-balls-panel">
        <div class="recent-title">Últimas Bolas Cantadas</div>
        <div class="balls-row" id="recentBalls">
            <div style="color: #555; font-size: 13px; padding: 10px;">Esperando primera bola...</div>
        </div>
    </div>
</div>

<script>
    let socket;
    let dbCartones = []; // Almacenará la base de datos de cartones cargada localmente
    let miCartonActivo = null;
    let bolasCantadas = new Set();
    let ultimaBolaCantada = null;

    // 1. Cargar la base de datos de cartones de manera asíncrona
    async function cargarBaseDatosCartones() {
        try {
            const respuesta = await fetch('/cartones.json');
            if (respuesta.ok) {
                dbCartones = await respuesta.json();
                console.log(`Base de datos cargada: ${dbCartones.length} cartones.`);
            } else {
                console.error("No se pudo leer cartones.json directamente de la raíz.");
            }
        } catch (error) {
            console.error("Error al cargar la base de datos de cartones:", error);
        }
    }

    // 2. Conexión en tiempo real por WebSockets
    function conectarJugadorWS() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const host = window.location.host;
        socket = new WebSocket(`${protocol}//${host}`);

        socket.onopen = () => {
            console.log("Conectado al servidor de El Bingazo");
            const status = document.getElementById('connectionStatus');
            status.innerText = "🟢 EN VIVO";
            status.className = "badge bg-online";
        };

        socket.onclose = () => {
            console.log("Desconectado. Reintentando...");
            const status = document.getElementById('connectionStatus');
            status.innerText = "🔴 DESCONECTADO";
            status.className = "badge bg-offline";
            setTimeout(conectarJugadorWS, 3000);
        };

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            console.log("Mensaje recibido:", data);

            switch(data.type) {
                case 'BOLA_SACADA':
                    registrarBola(data.numero, data.letra);
                    break;
                case 'SYNC_BOLAS':
                    sincronizarBolas(data.bolas, data.ultimaBola);
                    break;
                case 'BARRIDO':
                    reiniciarTablero();
                    break;
            }
        };
    }

    // Inicializar al cargar la página
    window.addEventListener('load', () => {
        cargarBaseDatosCartones();
        conectarJugadorWS();
        
        // Cargar cartón si ya estaba guardado en la sesión
        const guardado = localStorage.getItem('miCartonId');
        if (guardado) {
            document.getElementById('cardIdInput').value = guardado;
            setTimeout(() => buscarYAsignarCarton(), 800); // Dar un margen para que cargue el JSON
        }
    });

    // 3. Buscar el cartón cargado en el JSON
    function buscarYAsignarCarton() {
        const inputId = document.getElementById('cardIdInput').value.trim().toUpperCase();
        if (!inputId) return alert("Por favor ingresa un ID.");

        if (dbCartones.length === 0) {
            return alert("La base de datos de cartones aún se está cargando. Inténtalo de nuevo en 2 segundos.");
        }

        const cartonEncontrado = dbCartones.find(c => c.id.toUpperCase() === inputId);

        if (!cartonEncontrado) {
            return alert("¡ID de cartón no encontrado en la base de datos!");
        }

        miCartonActivo = cartonEncontrado;
        localStorage.setItem('miCartonId', miCartonActivo.id);

        document.getElementById('displayCardId').textContent = miCartonActivo.id;
        document.getElementById('bingoCardContainer').style.display = 'flex';

        renderizarCarton();
    }

    // 4. Pintar el cartón en la pantalla del celular
    function renderizarCarton() {
        const boardGrid = document.getElementById('boardGrid');
        boardGrid.innerHTML = '';

        if (!miCartonActivo) return;

        // El cartón tiene un grid de 5x5
        for (let fila = 0; fila < 5; fila++) {
            for (let col = 0; col < 5; col++) {
                const valor = miCartonActivo.grid[fila][col];
                const cell = document.createElement('div');
                cell.className = 'board-cell';

                if (valor === 0 || valor === "FREE") {
                    cell.classList.add('free-cell', 'marked');
                    cell.innerHTML = 'FREE<br>⭐';
                    cell.id = 'cell-free';
                } else {
                    cell.textContent = valor;
                    cell.id = `cell-num-${valor}`;
                    
                    // Si este número ya fue cantado, lo marcamos de una vez
                    if (bolasCantadas.has(valor)) {
                        cell.classList.add('marked');
                        if (valor === ultimaBolaCantada) {
                            cell.classList.add('just-marked');
                        }
                    }
                }
                boardGrid.appendChild(cell);
            }
        }
    }

    // 5. Procesar una nueva bola cantada
    function registrarBola(numero, letra) {
        bolasCantadas.add(numero);
        ultimaBolaCantada = numero;

        // Quitar efectos previos de "just-marked"
        document.querySelectorAll('.board-cell').forEach(c => c.classList.remove('just-marked'));

        // Marcar la celda correspondiente si existe en este cartón
        const celda = document.getElementById(`cell-num-${numero}`);
        if (celda) {
            celda.classList.add('marked', 'just-marked');
        }

        actualizarHistorialVisual();
    }

    // Sincronizar estado completo si el jugador entra a mitad de la partida
    function sincronizarBolas(bolas, ultima) {
        bolasCantadas = new Set(bolas);
        ultimaBolaCantada = ultima ? ultima.num : null;
        
        if (miCartonActivo) {
            renderizarCarton();
        }
        actualizarHistorialVisual();
    }

    // Reiniciar tablero por barrido
    function reiniciarTablero() {
        bolasCantadas.clear();
        ultimaBolaCantada = null;
        
        if (miCartonActivo) {
            renderizarCarton();
        }
        actualizarHistorialVisual();
    }

    // Actualizar la fila de bolas recientes
    function actualizarHistorialVisual() {
        const container = document.getElementById('recentBalls');
        container.innerHTML = '';

        if (bolasCantadas.size === 0) {
            container.innerHTML = '<div style="color: #555; font-size: 13px; padding: 10px;">Esperando primera bola...</div>';
            return;
        }

        // Mostrar las últimas 6 bolas cantadas (reversa)
        const arrayBolas = Array.from(bolasCantadas).reverse().slice(0, 6);
        arrayBolas.forEach((num, index) => {
            const letra = ['B', 'I', 'N', 'G', 'O'][Math.floor((num - 1) / 15)];
            const pill = document.createElement('div');
            pill.className = `ball-pill ${index === 0 ? 'active' : ''}`;
            pill.textContent = `${letra}${num}`;
            container.appendChild(pill);
        });
    }
</script>
</body>
</html>
