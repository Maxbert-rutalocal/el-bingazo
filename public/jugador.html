<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis Cartones - El Bingazo</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --primary: #ff9900; --bg: #0d0d13; --surface: #161622; --text: #ffffff; --success: #2ec4b6; --danger: #e74c3c; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 480px; margin: 0 auto; }
        .header { background: var(--surface); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #232335; }
        .card-login { background: var(--surface); padding: 25px 20px; border-radius: 16px; border: 1px solid #232335; margin-top: 30px; }
        input { width: 100%; padding: 14px; font-size: 16px; text-transform: uppercase; border-radius: 8px; border: 2px solid #33334c; background: #07070a; color: #fff; text-align: center; font-weight: bold; margin-bottom: 15px; }
        input:focus { border-color: var(--primary); outline: none; }
        .btn-add { background: var(--primary); color: #000; border: none; padding: 14px; font-size: 16px; font-weight: bold; width: 100%; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-bottom: 10px;}
        
        .tabs-container { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0 10px 0; margin-bottom: 10px; }
        .tab-btn { background: #232335; color: #a0a0b0; border: 1px solid #33334c; padding: 10px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: var(--primary); color: #000; }
        
        .mode-container { display: flex; gap: 10px; background: #232335; padding: 6px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #33334c;}
        .mode-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .mode-manual { background: var(--primary); color: #000; }
        .mode-auto { background: transparent; color: #a0a0b0; }

        .bingo-wrapper { background: #ffffff; color: #111116; padding: 12px; border-radius: 16px; margin-bottom: 15px; }
        .bingo-letters { display: grid; grid-template-columns: repeat(5, 1fr); font-size: 26px; font-weight: 900; color: #ff9900; margin-bottom: 8px; }
        .bingo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .cell { aspect-ratio: 1; background: #f0f2f5; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800; cursor: pointer; border-bottom: 3px solid #dbdee4; }
        .cell.marked { background: var(--success); color: #fff; border-bottom-color: #1b8a7f; }
        .cell.free-space { background: var(--danger); color: #fff; font-size: 11px; font-weight: 900; }
        .status-bar { font-size: 15px; font-weight: bold; color: var(--primary); margin-top: 10px; }
        
        .btn-limpiar { background: transparent; color: #666; border: none; text-decoration: underline; margin-top: 15px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div id="viewLogin" class="card-login">
        <h2 style="margin-top:0; color:var(--primary);">MIS CARTONES</h2>
        <p style="color:#a0a0b0; font-size:14px; margin-bottom:20px;">Ingresa tus datos para empezar a jugar.</p>
        <input type="text" id="nombreInput" placeholder="TU NOMBRE Y APELLIDO">
        <input type="tel" id="telefonoInput" placeholder="TU NÚMERO DE TELÉFONO">
        <input type="text" id="cartonIdInput" placeholder="ID DEL CARTÓN (EJ: 12)">
        <button class="btn-add" onclick="solicitarCartonServidor()">VINCULAR MI CARTÓN ➕</button>
        <div id="listaMisIds" style="margin-top:20px; text-align:left; color:#a0a0b0;"></div>
        <button id="btnEmpezarJuego" class="btn-add" style="background:var(--success); display:none;" onclick="mostrarPantallaJuego()">IR A JUGAR EN VIVO ➡️</button>
        
        <!-- Botón para borrar memoria si prestas el celular -->
        <button class="btn-limpiar" onclick="limpiarMemoriaCelular()">Soy otro jugador (Borrar mis datos guardados)</button>
    </div>

    <div id="viewGame" style="display: none;">
        <div class="header">
            <h1 style="margin: 0; color: var(--primary);">EL BINGAZO LIVE</h1>
            
            <div style="display:flex; justify-content:center; align-items:center; gap:10px; margin-top:8px;">
                <span style="font-size: 14px; font-weight: bold;">Estado de pago:</span>
                <div id="paymentIndicator" style="width: 16px; height: 16px; border-radius: 50%; background: red; box-shadow: 0 0 12px red; transition: 0.3s;"></div>
            </div>
            
            <button id="btnPagar" class="btn-add" style="background:#25D366; color:#fff; margin-top: 10px; font-size: 13px;" onclick="notificarPago()">📲 ENVIAR COMPROBANTE</button>
            <div class="status-bar" id="liveStatus">Esperando primera balota...</div>
        </div>

        <div class="tabs-container" id="cartonTabs"></div>

        <div class="mode-container">
            <button id="btnModoManual" class="mode-btn mode-manual" onclick="cambiarModo('manual')">MANUAL ✍️</button>
            <button id="btnModoAuto" class="mode-btn mode-auto" onclick="cambiarModo('auto')">AUTO 🤖</button>
        </div>

        <div class="bingo-wrapper">
            <div class="bingo-letters"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>
            <div id="bingoGridDisplay" class="bingo-grid"></div>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button onclick="pedirPausa()" class="btn-add" style="background: var(--danger);">⏸ PAUSA</button>
            <button onclick="cantarBingo()" class="btn-add" style="background: #ffd700; color: #000;">🏆 ¡BINGO!</button>
        </div>
        <button class="btn-add" style="background:#232335; color:#fff;" onclick="regresarALogin()">➕ AGREGAR OTRO</button>
    </div>
</div>

<script>
    const socket = io();
    let cartonesCargados = {}, idCartonActivo = null, bolasCantadasGlobal = new Set();
    let nombreJugador = "", telefonoJugador = "";
    let modoJuego = 'manual';

    // --- MAGIA 1: RECUPERAR MEMORIA AL ABRIR LA PÁGINA ---
    window.onload = () => {
        const guardado = localStorage.getItem('bingazo_datos');
        if (guardado) {
            const datos = JSON.parse(guardado);
            if (datos.nombre && datos.tel && datos.cartones && datos.cartones.length > 0) {
                nombreJugador = datos.nombre;
                telefonoJugador = datos.tel;
                document.getElementById('nombreInput').value = nombreJugador;
                document.getElementById('telefonoInput').value = telefonoJugador;
                
                // Le pedimos al servidor que nos devuelva nuestros cartones
                datos.cartones.forEach(id => {
                    socket.emit('SOLICITAR_CARTON', { id, nombre: nombreJugador, tel: telefonoJugador });
                });
            }
        }
    };

    // --- MAGIA 2: FUNCIÓN PARA GUARDAR EN EL CELULAR ---
    function guardarEnMemoriaCelular() {
        const datosGuardar = { nombre: nombreJugador, tel: telefonoJugador, cartones: [], marcados: {} };
        Object.keys(cartonesCargados).forEach(id => {
            datosGuardar.cartones.push(id);
            datosGuardar.marcados[id] = Array.from(cartonesCargados[id].marcadosManual);
        });
        localStorage.setItem('bingazo_datos', JSON.stringify(datosGuardar));
    }

    function limpiarMemoriaCelular() {
        if(confirm("¿Seguro que quieres borrar tus datos de este dispositivo?")) {
            localStorage.removeItem('bingazo_datos');
            location.reload();
        }
    }

    socket.on('ESTADO_INICIAL', (payload) => {
        bolasCantadasGlobal.clear();
        if (payload?.data?.bolasSacadas) payload.data.bolasSacadas.forEach(b => bolasCantadasGlobal.add(Number(b)));
        if (idCartonActivo) redibujarCartonActual();
    });

    socket.on('ENTREGAR_CARTON', (msg) => {
        if (!cartonesCargados[msg.carton.id]) {
            cartonesCargados[msg.carton.id] = { id: msg.carton.id, grid: msg.carton.grid, marcadosManual: new Set() };
            
            // Restaurar las marcas manuales que se guardaron en la memoria
            const guardado = localStorage.getItem('bingazo_datos');
            if (guardado) {
                const datos = JSON.parse(guardado);
                if (datos.marcados && datos.marcados[msg.carton.id]) {
                    datos.marcados[msg.carton.id].forEach(num => cartonesCargados[msg.carton.id].marcadosManual.add(num));
                }
            }
        }
        actualizarListaIngreso();
        guardarEnMemoriaCelular(); // Guardamos cada vez que recibimos un cartón
        
        const ind = document.getElementById('paymentIndicator');
        const btnPago = document.getElementById('btnPagar');
        if (msg.pagado) {
            ind.style.background = 'var(--success)'; 
            ind.style.boxShadow = '0 0 15px var(--success)';
            if (btnPago) btnPago.style.display = 'none';
        } else {
            ind.style.background = 'red'; 
            ind.style.boxShadow = '0 0 15px red';
            if (btnPago) btnPago.style.display = 'block';
        }
    });

    socket.on('NUEVA_BOLA', (msg) => {
        bolasCantadasGlobal.add(Number(msg.bola));
        document.getElementById('liveStatus').textContent = `🚨 BALOTA EN VIVO: ${msg.letra} - ${msg.bola}`;
        if (modoJuego === 'auto') redibujarCartonActual(); 
    });

    socket.on('REINICIAR_JUEGO', () => {
        bolasCantadasGlobal.clear();
        Object.keys(cartonesCargados).forEach(id => cartonesCargados[id].marcadosManual.clear());
        guardarEnMemoriaCelular(); // Actualizamos memoria para borrar marcas viejas
        document.getElementById('liveStatus').textContent = "🔄 Juego reiniciado.";
        redibujarCartonActual();
    });

    socket.on('ERROR_CARTON', (msg) => alert(msg.mensaje));

    socket.on('CARTON_ACTIVADO', (data) => {
        const targetId = String(data.cartonId).toUpperCase();
        const idsCargados = Object.keys(cartonesCargados).map(id => String(id).toUpperCase());

        if (idsCargados.includes(targetId)) {
            const ind = document.getElementById('paymentIndicator');
            const btnPago = document.getElementById('btnPagar');
            
            if (data.pagado) {
                ind.style.background = 'var(--success)'; 
                ind.style.boxShadow = '0 0 15px var(--success)';
                if(btnPago) btnPago.style.display = 'none';
                alert(`✅ ¡Tu cartón ID: ${data.cartonId} ha sido activado para jugar!`);
            } else {
                ind.style.background = 'red'; 
                ind.style.boxShadow = '0 0 15px red';
                if(btnPago) btnPago.style.display = 'block';
            }
        }
    });

    function solicitarCartonServidor() {
        const nombre = document.getElementById('nombreInput').value.trim();
        const tel = document.getElementById('telefonoInput').value.trim();
        const id = document.getElementById('cartonIdInput').value.trim().toUpperCase();
        
        if (!nombre || !tel || !id) return alert("Por favor, llena los tres campos para continuar.");
        if (cartonesCargados[id]) return alert("Este cartón ya está vinculado.");

        nombreJugador = nombre; telefonoJugador = tel;
        // Ahora enviamos todo junto para que el servidor verifique
        socket.emit('SOLICITAR_CARTON', { id, nombre, tel });
        document.getElementById('cartonIdInput').value = "";
    }

    function notificarPago() {
        const numeroAdmin = "570000000000"; 
        const msj = `Hola, soy ${nombreJugador}. Envío comprobante para activar mi cartón ID: ${idCartonActivo}`;
        window.open(`https://wa.me/${numeroAdmin}?text=${encodeURIComponent(msj)}`, '_blank');
    }

    function pedirPausa() { socket.emit('JUGADOR_PAUSA', { nombre: nombreJugador, cartonId: idCartonActivo }); alert("Pausa solicitada"); }
    function cantarBingo() { socket.emit('JUGADOR_BINGO', { nombre: nombreJugador, cartonId: idCartonActivo }); alert("Bingo enviado"); }

    function actualizarListaIngreso() {
        const ids = Object.keys(cartonesCargados);
        if(ids.length > 0) {
            document.getElementById('listaMisIds').innerHTML = `IDs vinculados: <span style="color:var(--primary); font-weight:bold;">${ids.join(', ')}</span>`;
            document.getElementById('btnEmpezarJuego').style.display = "block";
            document.getElementById('nombreInput').style.display = 'none';
            document.getElementById('telefonoInput').style.display = 'none';
        }
    }

    function mostrarPantallaJuego() {
        document.getElementById('viewLogin').style.display = 'none';
        document.getElementById('viewGame').style.display = 'block';
        idCartonActivo = Object.keys(cartonesCargados)[0];
        generarPestañas(); redibujarCartonActual();
    }

    function generarPestañas() {
        const container = document.getElementById('cartonTabs'); container.innerHTML = '';
        Object.keys(cartonesCargados).forEach(id => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${id === idCartonActivo ? 'active' : ''}`;
            btn.textContent = `ID ${id}`;
            btn.onclick = () => { idCartonActivo = id; generarPestañas(); redibujarCartonActual(); };
            container.appendChild(btn);
        });
    }

    function cambiarModo(modo) {
        modoJuego = modo;
        const btnManual = document.getElementById('btnModoManual');
        const btnAuto = document.getElementById('btnModoAuto');
        
        if (modo === 'manual') {
            btnManual.className = 'mode-btn mode-manual';
            btnAuto.className = 'mode-btn mode-auto';
            btnManual.removeAttribute('style');
            btnAuto.removeAttribute('style');
        } else {
            btnManual.className = 'mode-btn mode-auto';
            btnAuto.className = 'mode-btn mode-manual';
            btnAuto.style.background = 'var(--success)';
            btnAuto.style.color = '#000';
            btnManual.style.background = 'transparent';
            btnManual.style.color = '#a0a0b0';
        }
        redibujarCartonActual();
    }

    function redibujarCartonActual() {
        if (!idCartonActivo || !cartonesCargados[idCartonActivo]) return;
        const carton = cartonesCargados[idCartonActivo];
        const display = document.getElementById('bingoGridDisplay'); display.innerHTML = '';

        carton.grid.forEach(fila => fila.forEach(valor => {
            const cell = document.createElement('div');
            const num = Number(valor);
            cell.className = (valor === "FREE" || valor === 0) ? 'cell free-space' : 'cell';
            cell.textContent = (valor === "FREE" || valor === 0) ? "LIBRE" : valor;
            
            if (modoJuego === 'auto') {
                if (bolasCantadasGlobal.has(num) || carton.marcadosManual.has(num)) cell.classList.add('marked');
            } else {
                if (carton.marcadosManual.has(num)) cell.classList.add('marked');
            }
            
            cell.onclick = () => {
                if (num === 0) return;
                carton.marcadosManual.has(num) ? carton.marcadosManual.delete(num) : carton.marcadosManual.add(num);
                guardarEnMemoriaCelular(); // Guardamos la marca manual instantáneamente
                redibujarCartonActual();
            };
            display.appendChild(cell);
        }));
    }

    function regresarALogin() { document.getElementById('viewGame').style.display = 'none'; document.getElementById('viewLogin').style.display = 'block'; }
</script>
</body>
</html>
