<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EL BINGAZO — Gestión y Ganadores</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --naranja: #ff6600; --amarillo: #ffcc00; --morado: #660099; --rosa: #ff0066; --success: #27ae60; --danger: #e74c3c; --info: #2980b9; }
        body { font-family: 'Arial Black', sans-serif; background: #222; margin: 0; padding: 0; color: white; }
        .no-print { background: #000; color: #fff; padding: 15px; border-bottom: 5px solid var(--naranja); }
        .admin-panel { background: #111; border: 1px solid #333; padding: 15px; border-radius: 8px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 10px; }
        .panel-pendientes { background: #1a0f00; border: 2px solid var(--naranja); display: flex; flex-direction: column; align-items: stretch; }
        input, textarea { padding: 8px; border-radius: 4px; border: none; font-family: sans-serif; }
        button { cursor: pointer; font-weight: bold; border: none; border-radius: 5px; padding: 10px; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: scale(1.02); }
        #ganadoresContainer { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; padding: 20px; }
        .card-ganador { background: #333; border: 3px solid var(--rosa); border-radius: 12px; padding: 15px; position: relative; color: white; }
        .card-ganador h3 { margin: 0 0 10px 0; color: #fff; background: var(--rosa); padding: 5px; border-radius: 4px; text-align: center; font-size: 14px; }
        .nota-pago { width: 100%; margin-top: 10px; background: #222; color: #0f0; border: 1px dashed #555; padding: 8px; font-size: 12px; border-radius: 4px; resize: none; box-sizing: border-box; }
        #resBusqueda { margin-top: 10px; padding: 15px; border-radius: 8px; background: #333; display: inline-block; min-width: 450px; border: 2px solid var(--amarillo); position: relative; }
        .close-search { position: absolute; top: 5px; right: 5px; background: var(--danger); color: white; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; }
        .status-badge { padding: 5px 10px; border-radius: 4px; font-size: 14px; text-transform: uppercase; font-weight: 900; }
        .bg-paid { background: var(--success); }
        .bg-pending { background: var(--danger); }
        #areaReporte { background: #fff; color: #000; padding: 20px; margin: 20px; border-radius: 10px; display: none; max-height: 70vh; overflow-y: auto;}
        #printArea { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 20px; background: #fff; }
        .carton { width: 420px; border: 4px solid var(--morado); border-radius: 15px; overflow: hidden; background: #fff; margin: 5px; color: #000; }
        @media print { .no-print { display: none !important; } body { background: #fff; } .card-ganador { border-color: #000; color: #000 !important; background: #fff; } .nota-pago { color: #000; border: 1px solid #000; } #areaReporte { display: block !important; margin: 0; padding: 0; max-height: none; overflow: visible;} }
    </style>
</head>
<body>
    <div class="no-print">
        <div class="admin-panel panel-pendientes">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <strong style="color:var(--naranja); font-size: 18px;">💰 PAGOS PENDIENTES (POR AUTORIZAR)</strong>
                <span id="contadorPendientes" style="background: red; color: white; padding: 4px 10px; border-radius: 10px; font-size: 14px;">0</span>
            </div>
            <div id="listaPendientes" style="display:flex; flex-direction:column; gap:8px; margin-top:10px; max-height: 250px; overflow-y:auto; padding-right: 5px;"></div>
        </div>

        <div class="admin-panel">
            <strong>🔍 BUSCADOR Y AUTORIZADOR:</strong>
            <input type="text" id="searchID" placeholder="ID a buscar" onkeypress="if(event.key === 'Enter') buscar()">
            <button onclick="buscar()" style="background:var(--amarillo); color:black;">BUSCAR</button>
            <div id="resBusqueda">Esperando ID...</div>
        </div>

        <div class="admin-panel">
            <strong>👤 VENTA MANUAL Y RESET:</strong>
            <input type="text" id="regNombre" placeholder="Nombre">
            <input type="text" id="regTel" placeholder="Teléfono">
            <input type="text" id="regIDs" placeholder="ID (ej: 1)">
            <label><input type="checkbox" id="regPagado"> ¿Pagó?</label>
            <button onclick="registrarManual()" style="background:var(--success); color:white;">GUARDAR VENTA</button>
            <button onclick="generarReporte()" style="background:white; color:black;">📊 LISTA VENTAS</button>
            <button onclick="borrarVentas()" style="background:var(--danger); color:white; margin-left: 15px;">🗑️ RESETEAR VENTAS</button>
        </div>

        <div class="admin-panel">
            <strong>1. DATOS PDF:</strong>
            <input type="file" id="fileInput" accept=".json">
            <input type="number" id="blockNum" value="1" style="width: 50px;">
            <button onclick="generar()" style="background:var(--naranja); color:white;">MOSTRAR CARTONES</button>
            <button onclick="window.print()" style="background:var(--morado); color:white;">💾 IMPRIMIR PDF</button>
        </div>

        <div class="admin-panel" style="background: #282828; border: 2px solid var(--rosa);">
            <strong>🏆 GANADOR:</strong>
            <input type="text" id="winID" placeholder="ID ej: 1" style="width:120px" oninput="buscarDatosGanador()">
            <input type="text" id="winNombre" placeholder="Nombre (Auto)">
            <input type="text" id="winTel" placeholder="Teléfono (Auto)">
            <input type="text" id="winSorteo" placeholder="Premio" style="width:150px">
            <button onclick="agregarGanador()" style="background:var(--rosa); color:white;">+ AÑADIR</button>
            <button onclick="borrarGanadores()" style="background:white; color:black;">⚠️ LIMPIAR GANADORES</button>
        </div>
    </div>

    <div id="printArea"></div>
    <div id="areaReporte"></div>
    <div id="ganadoresContainer"></div>

    <script>
        const socket = io();
        let datosBingo = [];
        let registroVentas = [];
        let ganadores = JSON.parse(localStorage.getItem('ganadoresBingo')) || [];

        // RECARGA TOTAL AL RECIBIR LA ORDEN
        socket.on('RESETEO_GLOBAL_VENTAS', () => { location.reload(); });

        socket.on('GESTION_NUEVO_REGISTRO', (nuevaBaseDatos) => {
            registroVentas = nuevaBaseDatos;
            renderPendientes();
            if (document.getElementById('areaReporte').style.display === 'block') generarReporte();
            if (document.getElementById('resBusqueda').innerHTML !== "Esperando ID...") buscar(true);
        });

        function autorizarPago(cartonId) { socket.emit('GESTION_TOGGLE_PAGO', { cartonId: cartonId, pagado: true }); }
        function revocarPago(cartonId) { socket.emit('GESTION_TOGGLE_PAGO', { cartonId: cartonId, pagado: false }); }

        function borrarVentas() {
            if(confirm("⚠️ ¡ATENCIÓN! ¿Eliminar TODOS los registros de venta? El sistema quedará en blanco.")) {
                socket.emit('ADMIN_RESET_VENTAS');
            }
        }

        function renderPendientes() {
            const container = document.getElementById('listaPendientes');
            const contador = document.getElementById('contadorPendientes');
            const pendientes = registroVentas.filter(v => !v.pagado);
            contador.textContent = pendientes.length;

            if (pendientes.length === 0) {
                container.innerHTML = "<div style='color:#888; text-align:center; padding: 10px;'>Todo al día. No hay cartones por autorizar. ✅</div>";
                return;
            }
            container.innerHTML = pendientes.map(p => `
                <div style="display:flex; justify-content:space-between; align-items:center; background:#000; padding:12px; border-radius:8px; border-left: 5px solid red;">
                    <div>
                        <b style="font-size:16px;">${p.nombre}</b> <span style="color:#aaa; font-size:12px;">(Tel: ${p.tel || "N/A"})</span><br>
                        <span style="color:var(--naranja); font-size:14px; font-weight:bold;">Cartón ID: ${p.cartones[0]}</span>
                    </div>
                    <button onclick="autorizarPago('${p.cartones[0]}')" style="background:var(--success); color:white; padding:10px 15px; font-size:14px; font-weight:bold; border-radius:6px;">✅ AUTORIZAR CARTÓN</button>
                </div>
            `).join('');
        }

        let ultimoIdBuscado = "";
        function buscar(autoRefresh = false) { 
            const inputVal = document.getElementById('searchID').value.toUpperCase().trim();
            const idBusqueda = autoRefresh ? ultimoIdBuscado : inputVal;
            if(!idBusqueda) return;
            ultimoIdBuscado = idBusqueda;
            const res = document.getElementById('resBusqueda'); 
            const index = registroVentas.findIndex(v => v.cartones.includes(idBusqueda)); 
            if(index !== -1) { 
                const p = registroVentas[index]; 
                res.innerHTML = `
                    <div onclick="cerrarBusqueda()" class="close-search">X</div>
                    <span class="status-badge ${p.pagado ? 'bg-paid' : 'bg-pending'}">${p.pagado ? 'AUTORIZADO' : 'PENDIENTE'}</span>
                    <br><b style="font-size:18px;">${p.nombre}</b> (Tel: ${p.tel}) - ID: ${p.cartones[0]}<br>
                    <button onclick="autorizarPago('${p.cartones[0]}')" style="margin-top:10px; padding: 15px; font-size: 16px; font-weight:bold; background:var(--success); border-radius:6px; display: ${p.pagado ? 'none' : 'inline-block'}">✅ AUTORIZAR CARTÓN</button>
                    <button onclick="revocarPago('${p.cartones[0]}')" style="margin-top:10px; padding: 10px; background:var(--danger); border-radius:6px; display: ${p.pagado ? 'inline-block' : 'none'}">REVOCAR AUTORIZACIÓN</button>`; 
            } else { res.innerHTML = "❌ Cartón no encontrado en el sistema."; } 
        }
        function cerrarBusqueda() { document.getElementById('resBusqueda').innerHTML = "Esperando ID..."; document.getElementById('searchID').value = ""; }

        socket.on('GESTION_REGISTRAR_GANADOR_AUTO', (data) => {
            data.ids.forEach(id => {
                const venta = registroVentas.find(v => v.cartones.includes(id));
                ganadores.push({ id: Date.now() + Math.random(), sorteo: data.pattern, cartonID: id, nombre: venta ? venta.nombre : "Jugador App", telefono: venta ? (venta.tel || "APP") : "APP", nota: "Ganador Automático" });
            });
            localStorage.setItem('ganadoresBingo', JSON.stringify(ganadores));
            renderGanadores();
        });

        function registrarManual() { 
            const n = document.getElementById('regNombre').value.trim(), t = document.getElementById('regTel').value.trim() || "Manual", i = document.getElementById('regIDs').value.toUpperCase().trim(), p = document.getElementById('regPagado').checked; 
            if(!n || !i) return alert("Faltan datos"); 
            const ids = i.split(',').map(x => x.trim()).filter(x => x !== ""); 
            ids.forEach(id => {
                if (registroVentas.find(v => v.cartones.includes(id))) return alert(`Cartón ${id} ya registrado.`);
                socket.emit('JUGADOR_REGISTRARSE', { nombre: n, tel: t, cartonId: id });
                if (p) setTimeout(() => autorizarPago(id), 400);
            });
            alert("✅ Registro guardado."); 
            document.getElementById('regIDs').value = ""; document.getElementById('regNombre').value = ""; document.getElementById('regTel').value = ""; 
        }

        function generarReporte() { 
            const area = document.getElementById('areaReporte'); 
            const pagados = registroVentas.filter(v => v.pagado);
            const pendientes = registroVentas.filter(v => !v.pagado);
            let htmlPagados = pagados.map(p => `<div style="margin-bottom:8px; border-bottom:1px solid #eee; padding:5px;"><b style="font-size:16px;">${p.nombre}</b> | 📱 ${p.tel || "N/A"} | 🎟️ IDs: <span style="color:var(--success); font-weight:bold;">${p.cartones.join(',')}</span></div>`).join('');
            let htmlPendientes = pendientes.map(p => `
                <div style="margin-bottom:8px; border-bottom:1px solid #eee; padding:5px; background: #fff5f5; display:flex; justify-content:space-between; align-items:center;">
                    <div><b style="font-size:16px;">${p.nombre}</b> | 📱 ${p.tel || "N/A"} | 🎟️ IDs: <span style="color:var(--danger); font-weight:bold;">${p.cartones.join(',')}</span></div>
                    <button onclick="autorizarPago('${p.cartones[0]}')" style="background:var(--success); color:white; padding:5px 10px; font-size:12px; font-weight:bold; border-radius:4px;">✅ AUTORIZAR</button>
                </div>
            `).join('');
            area.innerHTML = `<div style="background:white; padding:20px; color:black; border-radius:10px;"><div style="display:flex; justify-content:space-between; align-items:center;"><h1>LISTA DE VENTAS (${registroVentas.length} total)</h1><button onclick="document.getElementById('areaReporte').style.display='none'" class="no-print" style="background:var(--danger); color:white;">CERRAR REPORTE</button></div><h2 style="color:green;">✅ AUTORIZADOS (${pagados.length})</h2>${htmlPagados || "No hay pagados."}<h2 style="color:red; margin-top:20px;">❌ PENDIENTES (${pendientes.length})</h2>${htmlPendientes || "No hay pendientes."}</div>`; 
            area.style.display = 'block'; 
        }

        function buscarDatosGanador() { 
            const idsInput = document.getElementById('winID').value.toUpperCase().trim(); 
            if(!idsInput) return; 
            const ventaEncontrada = registroVentas.find(v => v.cartones.includes(idsInput.split(',')[0].trim())); 
            if(ventaEncontrada) { document.getElementById('winNombre').value = ventaEncontrada.nombre; document.getElementById('winTel').value = ventaEncontrada.tel || ""; } 
        }

        function agregarGanador() { 
            const sorteo = document.getElementById('winSorteo').value || "Premio General", idsInput = document.getElementById('winID').value.toUpperCase().trim(); 
            if(!idsInput) return alert("Ingresa un ID"); 
            idsInput.split(',').map(i => i.trim()).filter(i => i !== "").forEach((id, index) => { 
                const venta = registroVentas.find(v => v.cartones.includes(id)); 
                ganadores.push({ id: Date.now() + index, sorteo: sorteo, cartonID: id, nombre: document.getElementById('winNombre').value || (venta ? venta.nombre : "Desconocido"), telefono: document.getElementById('winTel').value || (venta ? venta.tel : "Sin teléfono"), nota: "" }); 
            }); 
            localStorage.setItem('ganadoresBingo', JSON.stringify(ganadores)); renderGanadores(); 
            document.getElementById('winID').value = ""; document.getElementById('winNombre').value = ""; document.getElementById('winTel').value = ""; 
        }

        function renderGanadores() { 
            const container = document.getElementById('ganadoresContainer'); container.innerHTML = ""; 
            ganadores.forEach(g => { 
                container.innerHTML += `<div class="card-ganador"><button onclick="eliminarIndividual(${g.id})" style="position:absolute; right:10px; top:10px; background:none; color:white; font-size:18px;">✕</button><h3>${g.sorteo}</h3><div class="info-ganador"><b>🎟️ ID:</b> <span style="color:var(--amarillo)">${g.cartonID}</span><br><b>👤 NOMBRE:</b> ${g.nombre}<br><b>📞 TEL:</b> ${g.telefono}</div><textarea class="nota-pago" onchange="actualizarNota(${g.id}, this.value)" placeholder="Notas de entrega o pago...">${g.nota}</textarea></div>`; 
            }); 
        }

        function eliminarIndividual(id) { ganadores = ganadores.filter(g => g.id !== id); localStorage.setItem('ganadoresBingo', JSON.stringify(ganadores)); renderGanadores(); }
        function actualizarNota(id, val) { const g = ganadores.find(v => v.id === id); if(g) { g.nota = val; localStorage.setItem('ganadoresBingo', JSON.stringify(ganadores)); } }
        function borrarGanadores() { if(confirm("¿Limpiar todo el registro de premios?")) { ganadores = []; localStorage.setItem('ganadoresBingo', "[]"); renderGanadores(); } }

        document.getElementById('fileInput').addEventListener('change', e => {
            const reader = new FileReader();
            reader.onload = ev => { datosBingo = JSON.parse(ev.target.result); alert("Base cargada."); };
            reader.readAsText(e.target.files[0]);
        });
        function generar() {
            const container = document.getElementById('printArea');
            if (container.innerHTML !== "") { container.innerHTML = ""; return; }
            if(datosBingo.length === 0) return alert("Carga el JSON primero.");
            const block = document.getElementById('blockNum').value.toString();
            datosBingo.filter(c => c.block.toString() === block).forEach(c => {
                let filasHtml = c.grid.map(fila => fila.map(num => `<div style="background:white; padding:10px; text-align:center; border:1px solid #ddd; font-size:12px;">${num === "FREE" ? "⭐" : num}</div>`).join('')).join('');
                container.innerHTML += `<div class="carton"><div style="background:var(--naranja); color:white; padding:10px; text-align:center;"><h2>EL BINGAZO</h2></div><div style="text-align:center; padding:10px; font-weight:bold;">ID: ${c.id}</div><div style="display:grid; grid-template-columns:repeat(5,1fr); background:#000; gap:1px;">${filasHtml}</div></div>`;
            });
        }
        window.onload = function() { renderGanadores(); renderPendientes(); }
    </script>
</body>
</html>
